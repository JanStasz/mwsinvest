# Publishes the site in public_html/ to GitHub Pages on every push to main.
#
# IMPORTANT: In GitHub repo Settings → Pages → Build and deployment,
# set Source to "GitHub Actions" (not "Deploy from a branch").
# Otherwise GitHub builds Jekyll from the repo root (which has no site)
# and the Pages URL returns 404.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload the site (only the public_html folder)
        uses: actions/upload-pages-artifact@v3
        with:
          path: public_html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
